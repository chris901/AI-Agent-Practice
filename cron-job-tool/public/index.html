<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能助手</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        background: #f4f6fb;
        color: #111827;
      }
      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: 56px 1fr;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #fff;
      }
      .topbar .brand {
        font-weight: 600;
      }
      .main {
        min-height: 0;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      .sidebar {
        border-right: 1px solid #e5e7eb;
        background: #fff;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .sidebar-header {
        padding: 12px;
        border-bottom: 1px solid #f1f5f9;
      }
      .btn {
        border: 1px solid #d1d5db;
        background: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }
      .btn.primary {
        background: #2563eb;
        border-color: #2563eb;
        color: #fff;
      }
      .sessions {
        overflow: auto;
        padding: 8px;
      }
      .session-item {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
      }
      .session-item:hover {
        background: #f8fafc;
      }
      .session-item.active {
        border-color: #bfdbfe;
        background: #eff6ff;
      }
      .session-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .session-actions {
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        border: 1px solid #e5e7eb;
        background: #fff;
        border-radius: 8px;
        padding: 4px 8px;
        cursor: pointer;
        font-size: 12px;
        color: #6b7280;
      }
      .icon-btn:hover {
        border-color: #d1d5db;
        color: #111827;
      }
      .session-title {
        font-size: 14px;
        font-weight: 500;
      }
      .session-time {
        margin-top: 4px;
        color: #6b7280;
        font-size: 12px;
      }
      .chat {
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .chat-header {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #fff;
      }
      .messages {
        overflow: auto;
        padding: 16px;
      }
      .empty {
        color: #6b7280;
        padding: 24px;
      }
      .row {
        margin-bottom: 12px;
        display: flex;
      }
      .row.user {
        justify-content: flex-start;
      }
      .row.assistant {
        justify-content: flex-end;
      }
      .bubble {
        max-width: 70%;
        border-radius: 10px;
        padding: 10px 12px;
        white-space: pre-wrap;
        line-height: 1.45;
      }
      .row.user .bubble {
        background: #fff;
        border: 1px solid #e5e7eb;
      }
      .row.assistant .bubble {
        background: #eef2ff;
        border: 1px solid #c7d2fe;
      }
      .composer {
        background: #fff;
        border-top: 1px solid #e5e7eb;
        padding: 12px;
      }
      .composer-main {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      .input {
        width: 100%;
        resize: vertical;
        min-height: 56px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 10px;
        font: inherit;
      }
      .status {
        margin-top: 8px;
        color: #6b7280;
        font-size: 12px;
      }
      @media (max-width: 900px) {
        .main {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">智能助手</div>
        <div>当前用户</div>
      </div>
      <div class="main">
        <aside class="sidebar">
          <div class="sidebar-header">
            <button id="newSessionBtn" class="btn primary">+ 新建对话</button>
          </div>
          <div id="sessions" class="sessions"></div>
        </aside>

        <section class="chat">
          <div class="chat-header">
            <div id="chatTitle">未选择会话</div>
          </div>
          <div id="messages" class="messages"></div>
          <div class="composer">
            <div class="composer-main">
              <textarea
                id="query"
                class="input"
                placeholder="请输入问题..."
              ></textarea>
              <button id="sendBtn" class="btn primary">发送</button>
            </div>
            <div id="status" class="status">状态：待机</div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const sessionsEl = document.getElementById('sessions');
      const messagesEl = document.getElementById('messages');
      const chatTitleEl = document.getElementById('chatTitle');
      const statusEl = document.getElementById('status');
      const queryEl = document.getElementById('query');
      const sendBtn = document.getElementById('sendBtn');
      const newSessionBtn = document.getElementById('newSessionBtn');

      let currentSessionId = '';
      let sessions = [];
      let es = null;
      let streamingBubble = null;

      function fmtTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleString();
      }

      function renderSessions() {
        sessionsEl.innerHTML = '';
        if (!sessions.length) {
          sessionsEl.innerHTML = '<div class="empty">暂无会话</div>';
          return;
        }
        sessions.forEach((s) => {
          const item = document.createElement('div');
          item.className =
            'session-item' + (s.id === currentSessionId ? ' active' : '');
          const title = s.title || s.id.slice(0, 8);
          item.innerHTML = `
            <div class="session-row">
              <div style="min-width:0; flex:1;">
                <div class="session-title">${title}</div>
                <div class="session-time">${fmtTime(s.updatedAt || s.createdAt)}</div>
              </div>
              <div class="session-actions">
                <button class="icon-btn" data-action="delete" data-id="${s.id}">删除</button>
              </div>
            </div>
          `;
          item.onclick = async () => {
            if (s.id === currentSessionId) return;
            currentSessionId = s.id;
            renderSessions();
            await loadMessages(currentSessionId);
          };
          const delBtn = item.querySelector('button[data-action="delete"]');
          delBtn.onclick = async (e) => {
            e.preventDefault();
            e.stopPropagation();
            const ok = confirm('确定删除该会话？（将同步删除向量索引）');
            if (!ok) return;
            try {
              closeStream();
              statusEl.textContent = '状态：删除中...';
              const res = await fetch(`/ai/sessions/${encodeURIComponent(s.id)}`, {
                method: 'DELETE',
              });
              if (!res.ok) throw new Error('删除失败');
              if (currentSessionId === s.id) {
                currentSessionId = '';
                chatTitleEl.textContent = '未选择会话';
                messagesEl.innerHTML =
                  '<div class="empty">会话已删除，请新建对话或选择其它会话。</div>';
              }
              await loadSessions();
              statusEl.textContent = '状态：已删除';
            } catch (err) {
              statusEl.textContent = `状态：删除失败 - ${err.message}`;
            }
          };
          sessionsEl.appendChild(item);
        });
      }

      function appendMessage(role, content) {
        const row = document.createElement('div');
        row.className = `row ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      function renderMessages(items) {
        messagesEl.innerHTML = '';
        if (!items.length) {
          messagesEl.innerHTML = '<div class="empty">暂无消息，开始你的第一问。</div>';
          return;
        }
        items.forEach((m) => appendMessage(m.role, m.content));
      }

      async function loadSessions() {
        const res = await fetch('/ai/sessions');
        if (!res.ok) throw new Error('加载会话失败');
        sessions = await res.json();
        renderSessions();
      }

      async function loadMessages(sessionId) {
        if (!sessionId) return;
        chatTitleEl.textContent = `当前会话：${sessionId.slice(0, 8)}`;
        const res = await fetch(`/ai/sessions/${sessionId}/messages`);
        if (!res.ok) throw new Error('加载消息失败');
        const data = await res.json();
        renderMessages(data);
      }

      function closeStream() {
        if (es) {
          es.close();
          es = null;
        }
        sendBtn.disabled = false;
      }

      async function ensureSession() {
        if (currentSessionId) return currentSessionId;
        const res = await fetch('/ai/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });
        if (!res.ok) throw new Error('创建会话失败');
        const data = await res.json();
        currentSessionId = data.id;
        await loadSessions();
        await loadMessages(currentSessionId);
        return currentSessionId;
      }

      async function sendMessage() {
        const query = queryEl.value.trim();
        if (!query) return;
        try {
          const sid = await ensureSession();
          closeStream();
          sendBtn.disabled = true;
          statusEl.textContent = '状态：流式回复中...';
          appendMessage('user', query);
          streamingBubble = appendMessage('assistant', '');
          queryEl.value = '';

          es = new EventSource(
            `/ai/chat/stream?query=${encodeURIComponent(query)}&sessionId=${encodeURIComponent(sid)}`,
          );
          es.onmessage = (event) => {
            if (!streamingBubble) return;
            streamingBubble.textContent += event.data;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          };
          es.onerror = async () => {
            statusEl.textContent = '状态：已结束';
            closeStream();
            streamingBubble = null;
            await loadSessions();
            await loadMessages(currentSessionId);
          };
        } catch (e) {
          statusEl.textContent = `状态：失败 - ${e.message}`;
          closeStream();
        }
      }

      newSessionBtn.onclick = async () => {
        try {
          closeStream();
          currentSessionId = '';
          await ensureSession();
          statusEl.textContent = '状态：已新建会话';
        } catch (e) {
          statusEl.textContent = `状态：失败 - ${e.message}`;
        }
      };
      sendBtn.onclick = sendMessage;
      queryEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      window.addEventListener('beforeunload', closeStream);

      (async () => {
        try {
          await loadSessions();
          if (sessions.length) {
            currentSessionId = sessions[0].id;
            await loadMessages(currentSessionId);
          } else {
            messagesEl.innerHTML =
              '<div class="empty">暂无会话，请点击「新建对话」或直接输入问题开始。</div>';
          }
        } catch (e) {
          statusEl.textContent = `状态：初始化失败 - ${e.message}`;
        }
      })();
    </script>
  </body>
</html>
